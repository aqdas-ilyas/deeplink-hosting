<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GetOutThere — View Trip</title>
  <!-- Open Graph tags give a rich preview when the link is shared -->
  <meta property="og:title" content="Check out this trip on GetOutThere" />
  <meta property="og:description" content="Open this trip in the GetOutThere app." />
  <meta property="og:type" content="website" />
  <style>
    :root { --navy:#001A3B; }
    * { box-sizing:border-box; }
    /* Full-bleed navy, styled like the app's splash screen. No buttons on this
       page by design — it either opens the app, redirects to a store (once the
       app is live there), or shows a single install note. */
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:var(--navy); display:flex; min-height:100vh; align-items:center; justify-content:center; padding:24px; }
    .wrap { text-align:center; }
    .wrap h2 { margin:0 0 18px; color:#fff; font-size:26px; letter-spacing:.5px; }
    .spinner { width:34px; height:34px; margin:0 auto; border-radius:50%;
      border:3px solid rgba(255,255,255,.25); border-top-color:#fff; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #note { display:none; margin:0 auto; color:rgba(255,255,255,.85); font-size:15px; line-height:1.5; max-width:300px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>GetOutThere</h2>
    <div id="spin" class="spinner"></div>
    <p id="note">Install the GetOutThere app to view this trip.</p>
  </div>

  <script>
    (function () {
      // Fill these in once the app is LIVE in each store — the page will then
      // send not-installed users there automatically. While empty, users see
      // the install note instead (a dead store link would show a 404).
      var PLAY_STORE_URL = '';
      var APP_STORE_URL = '';

      // /trip/<id>  ->  tripId
      var m = location.pathname.match(/\/trip\/([a-zA-Z0-9]+)/);
      var tripId = m ? m[1] : '';
      var appLink = 'getoutthere://trip/' + tripId;

      // Deferred deep linking (free): stash the target so the app can read it
      // from the clipboard on first launch after a fresh install.
      try { if (navigator.clipboard) navigator.clipboard.writeText(appLink); } catch (e) {}

      var ua = navigator.userAgent || '';
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);

      // If the app opens, this page is hidden — nothing else should happen.
      // Only visibilitychange/pagehide are trusted: `blur` also fires for the
      // harmless "cannot open page" alert on iOS, which is NOT the app opening.
      var appOpened = false;
      var attemptDone = false;
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) {
          appOpened = true;
        } else if (attemptDone) {
          // Loaded in a background tab: settle now that the user can see it.
          settle();
        }
      });
      window.addEventListener('pagehide', function () { appOpened = true; });

      // Called after the open-the-app attempt had its chance: either move on
      // to the store (when live) or swap the spinner for the install note.
      function settle() {
        if (appOpened || document.hidden) return;
        var store = isIOS ? APP_STORE_URL : (isAndroid ? PLAY_STORE_URL : '');
        if (store) { window.location = store; return; }
        document.getElementById('spin').style.display = 'none';
        document.getElementById('note').style.display = 'block';
      }
      function finishAttempt() { attemptDone = true; settle(); }

      // Note: with the app installed, Universal Links / App Links normally open
      // it straight from the tap and this page never loads. Reaching this page
      // means the link was opened in a browser context, so:
      if (tripId && isAndroid) {
        // Chrome opens the app natively via intent:// when it's installed.
        // The Play fallback is attached only once the listing is live.
        window.location =
          'intent://trip/' + tripId +
          '#Intent;scheme=getoutthere;package=com.getoutthere' +
          (PLAY_STORE_URL ? ';S.browser_fallback_url=' + encodeURIComponent(PLAY_STORE_URL) : '') +
          ';end';
        setTimeout(finishAttempt, 2000);
      } else if (tripId && isIOS) {
        // Opens the app if installed; otherwise iOS shows a dismissable alert
        // and settle() takes over.
        window.location = appLink;
        setTimeout(finishAttempt, 2000);
      } else {
        // Desktop or no trip id — nothing to auto-open.
        finishAttempt();
      }
    })();
  </script>
</body>
</html>
