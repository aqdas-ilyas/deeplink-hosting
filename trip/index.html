<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GetOutThere — View Trip</title>
  <!-- Open Graph tags give a rich preview when the link is shared -->
  <meta property="og:title" content="Check out this trip on GetOutThere" />
  <meta property="og:description" content="Open this trip in the GetOutThere app." />
  <meta property="og:type" content="website" />
  <style>
    :root { --navy:#001A3B; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:#EEF2F8; color:var(--navy); display:flex; min-height:100vh; align-items:center; justify-content:center; padding:24px; }
    .card { background:#fff; border-radius:16px; padding:28px 24px; max-width:380px; width:100%;
      box-shadow:0 10px 30px rgba(0,0,0,.08); text-align:center; }
    h1 { margin:0 0 4px; font-size:22px; }
    p { margin:0 0 20px; color:#555; }
    .btn { display:block; background:var(--navy); color:#fff; text-decoration:none; padding:14px;
      border-radius:12px; font-weight:700; margin-bottom:12px; }
    .stores { display:flex; gap:10px; margin-top:8px; }
    .stores a { flex:1; border:1px solid #d5dbe6; border-radius:12px; padding:12px; text-decoration:none;
      color:var(--navy); font-weight:600; font-size:14px; }
    .muted { font-size:12px; color:#999; margin-top:16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>GetOutThere</h1>
    <p>Open this trip in the app.</p>
    <a id="openApp" class="btn" href="#">Open in App</a>
    <div class="stores">
      <a id="appStore" href="REPLACE_APP_STORE_URL">App Store</a>
      <a id="playStore" href="https://play.google.com/store/apps/details?id=com.getoutthere">Google Play</a>
    </div>
    <p class="muted">Don't have the app? Install it and open this link again.</p>
  </div>

  <script>
    (function () {
      // /trip/<id>  ->  tripId
      var m = location.pathname.match(/\/trip\/([a-zA-Z0-9]+)/);
      var tripId = m ? m[1] : '';
      var appLink = 'getoutthere://trip/' + tripId;

      var openBtn = document.getElementById('openApp');
      openBtn.href = appLink;

      // Until the app is live and REPLACE_APP_STORE_URL is filled in, hide the
      // App Store button so iOS users aren't sent to a dead link.
      var appStoreBtn = document.getElementById('appStore');
      var appStoreReady = appStoreBtn.getAttribute('href').indexOf('REPLACE') === -1;
      if (!appStoreReady) appStoreBtn.style.display = 'none';

      // Deferred deep linking (free): stash the target so the app can read it
      // from the clipboard on first launch after a fresh install.
      try { if (navigator.clipboard) navigator.clipboard.writeText(appLink); } catch (e) {}

      var ua = navigator.userAgent || '';
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);
      var playUrl = document.getElementById('playStore').href;

      // If the app opens, this page loses visibility — remember that so the
      // delayed store redirect doesn't fire behind the user's back.
      var appOpened = false;
      function markOpened() { if (document.hidden || !document.hasFocus()) appOpened = true; }
      document.addEventListener('visibilitychange', markOpened);
      window.addEventListener('pagehide', function () { appOpened = true; });
      window.addEventListener('blur', markOpened);

      // Note: with the app installed, Universal Links / App Links normally open
      // it straight from the tap and this page never loads. Reaching this page
      // means the link was opened in a browser context, so:
      if (tripId) {
        if (isAndroid) {
          // Chrome checks installation natively via intent:// — opens the app
          // if installed, otherwise goes to the Play Store fallback URL.
          window.location =
            'intent://trip/' + tripId +
            '#Intent;scheme=getoutthere;package=com.getoutthere' +
            ';S.browser_fallback_url=' + encodeURIComponent(playUrl) + ';end';
          // Safety net for browsers/webviews that ignore intent:// links.
          setTimeout(function () {
            if (!appOpened && !document.hidden) window.location = playUrl;
          }, 2000);
        } else if (isIOS) {
          // Try the custom scheme (opens the app if installed), then fall back
          // to the App Store — but only if the app didn't open.
          window.location = appLink;
          setTimeout(function () {
            if (!appOpened && !document.hidden && appStoreReady) {
              window.location = appStoreBtn.href;
            }
          }, 1600);
        }
      }
    })();
  </script>
</body>
</html>
